{% if weather %}
<div class="d-inline-flex align-items-center gap-3 mt-4 px-3 py-2 rounded-4 bg-white bg-opacity-10 backdrop-blur border border-white border-opacity-25">
    <img src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
         alt="{{ weather.description }}" width="48" height="48" loading="lazy">
    <div class="text-start">
        <div class="fs-4 fw-bold lh-1">{{ weather.temp }}°C</div>
        <div class="small text-white opacity-75">{{ weather.description }} · {{ weather.city }}</div>
    </div>
</div>
{% endif %}
